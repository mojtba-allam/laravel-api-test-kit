name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-kit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: find api scripts config -name '*.sh' -print0 | xargs -0 shellcheck -S error

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Syntax check PHP adapters
        run: find scripts/adapters -name '*.php' -exec php -l {} \;

      - name: Verify test kit layout
        run: |
          test -f api/run-all-api-tests.sh
          test -f api/api-test-helpers.sh
          test -f config/test.env.example
          test -f config/bootstrap.sh
          test -x scripts/setup-project.sh
